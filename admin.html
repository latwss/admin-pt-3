<!doctype html>
<html lang="fi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>INTRY Admin</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0f172a;
  color:white;
}

.topbar{
  padding:20px;
  background:#111827;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}

.card{
  background:#1f2937;
  padding:20px;
  border-radius:12px;
  margin-bottom:20px;
}

input, textarea{
  width:100%;
  padding:10px;
  border-radius:8px;
  border:none;
  margin-top:5px;
  margin-bottom:15px;
  font-size:16px;
}

button{
  padding:12px 18px;
  border:none;
  border-radius:10px;
  background:#22c55e;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  opacity:0.9;
}

.block{
  background:#374151;
  padding:15px;
  border-radius:10px;
  margin-bottom:10px;
  cursor:move;
}
</style>
</head>

<body>

<div class="topbar">
  <h2>INTRY Admin</h2>
  <button onclick="save()">Tallenna</button>
</div>

<div class="container">

<div class="card">
<h3>Hero</h3>

<label>Otsikko</label>
<input id="title">

<label>Ingress</label>
<textarea id="ingress"></textarea>
</div>

<div class="card">
<h3>Blokit (voit siirtää)</h3>
<div id="blocks"></div>

<button onclick="addBlock()">+ Lisää blokki</button>
</div>

</div>

<script>
const API = "https://intry-content-api.late-hurskainen.workers.dev/content";

let data = {
  heroTitle: "",
  heroIngress: "",
  features: []
};

function render(){
  document.getElementById("title").value = data.heroTitle;
  document.getElementById("ingress").value = data.heroIngress;

  const root = document.getElementById("blocks");
  root.innerHTML = "";

  data.features.forEach((b,i)=>{
    root.innerHTML += `
      <div class="block" draggable="true" ondragstart="drag(${i})" ondragover="event.preventDefault()" ondrop="drop(${i})">
        <input placeholder="Ikoni (⚡)" value="${b.icon}" onchange="update(${i},'icon',this.value)">
        <input placeholder="Otsikko" value="${b.title}" onchange="update(${i},'title',this.value)">
        <textarea placeholder="Teksti" onchange="update(${i},'text',this.value)">${b.text}</textarea>
        <button onclick="remove(${i})">Poista</button>
      </div>
    `;
  });
}

function update(i,key,val){
  data.features[i][key] = val;
}

function addBlock(){
  data.features.push({icon:"⚡",title:"Uusi",text:"Teksti"});
  render();
}

function remove(i){
  data.features.splice(i,1);
  render();
}

let dragIndex;

function drag(i){
  dragIndex = i;
}

function drop(i){
  const item = data.features.splice(dragIndex,1)[0];
  data.features.splice(i,0,item);
  render();
}

function save(){
  data.heroTitle = document.getElementById("title").value;
  data.heroIngress = document.getElementById("ingress").value;

  fetch(API,{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify(data)
  }).then(()=>{
    alert("Tallennettu!");
  });
}

fetch(API)
.then(r=>r.json())
.then(d=>{
  if(d){
    data = d;
  }
  render();
});
</script>

</body>
</html>
